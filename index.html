<!DOCTYPE html>
<html>

<head>

<title>Ask My AI</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
margin-top:50px;
}

#chat{
width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:70%;
padding:10px;
}

button{
padding:10px 15px;
background:#007BFF;
color:white;
border:none;
cursor:pointer;
}

.message{
margin:10px 0;
text-align:left;
}

.user{
color:blue;
}

.ai{
color:green;
}

</style>

</head>

<body>

<h1>Ask My AI</h1>

<div id="chat">

<div id="messages"></div>

<input type="text" id="question" placeholder="Ask something">
<button onclick="askAI()">Send</button>

</div>

<script>

function askAI(){

let question=document.getElementById("question").value;

if(question==""){
return;
}

let messages=document.getElementById("messages");

messages.innerHTML+=
"<div class='message user'><b>You:</b> "+question+"</div>";

messages.innerHTML+=
"<div class='message ai'><b>AI:</b> I received your question.</div>";

document.getElementById("question").value="";

messages.scrollTop=messages.scrollHeight;

}

</script>

</body>

</html>
