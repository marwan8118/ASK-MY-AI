<!DOCTYPE html>
<html>

<head>
<title>Ask My AI</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin-top:40px;
}

#chat{
width:420px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:70%;
padding:10px;
}

button{
padding:10px;
background:#007BFF;
color:white;
border:none;
cursor:pointer;
}

.message{
margin:10px 0;
text-align:left;
}

.user{color:blue;}
.ai{color:green;}

</style>

</head>

<body>

<h1>Ask My AI</h1>

<div id="chat">

<div id="messages"></div>

<input id="question" placeholder="Ask something">
<button onclick="askAI()">Send</button>

</div>

<script>

function askAI(){

let q=document.getElementById("question").value;

if(q==""){return;}

let messages=document.getElementById("messages");

messages.innerHTML+=
"<div class='message user'><b>You:</b> "+q+"</div>";

let response="I'm a simple AI demo. Soon I will answer real questions.";

messages.innerHTML+=
"<div class='message ai'><b>AI:</b> "+response+"</div>";

document.getElementById("question").value="";

}

</script>

</body>

</html>
